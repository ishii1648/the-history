<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ヨーロッパ国境変遷マップ</title>
    <link rel="stylesheet" href="vendor/maplibre-gl.css" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div id="map"></div>
    <!-- TASK-9: GeoJSON ロード中スピナー（app-spec §5.4）。表示制御は main.ts -->
    <div
      id="loading-spinner"
      class="loading-spinner"
      role="status"
      aria-label="地図データを読み込み中"
      hidden
    >
    </div>
    <!-- TASK-9: fetch 失敗時のエラートースト + 再試行（app-spec §5.4）。文言・表示は main.ts -->
    <div id="error-toast" class="error-toast" role="alert" hidden>
      <span id="error-toast-message" class="error-toast-message"></span>
      <button
        id="error-toast-retry"
        class="error-toast-retry"
        type="button"
      >
        再試行
      </button>
      <button
        id="error-toast-close"
        class="error-toast-close"
        type="button"
        aria-label="閉じる"
      >
        ×
      </button>
    </div>
    <!-- TASK-7: ホバーツールチップ（app-spec §5.2）。位置・内容・表示制御は main.ts -->
    <div id="info-tooltip" class="info-tooltip" role="tooltip" hidden></div>
    <!-- TASK-7: クリック情報パネル（モバイルのホバー代替）。左上固定・閉じるボタン付き -->
    <div
      id="info-panel"
      class="info-panel"
      role="status"
      aria-live="polite"
      hidden
    >
      <span id="info-panel-label" class="info-panel-label"></span>
      <button
        id="info-panel-close"
        class="info-panel-close"
        type="button"
        aria-label="閉じる"
      >
        ×
      </button>
    </div>
    <!-- TASK-6: タイムラインスライダー（app-spec §5.1）。目盛り・値・年表示は main.ts が初期化する -->
    <div
      id="timeline"
      class="timeline"
      role="group"
      aria-label="年代スライダー"
    >
      <span id="timeline-year" class="timeline-year" aria-live="polite"
      >1000</span>
      <div class="timeline-controls">
        <button
          id="timeline-prev"
          class="timeline-btn"
          type="button"
          aria-label="前の年代"
        >
          ‹
        </button>
        <input
          id="timeline-slider"
          class="timeline-slider"
          type="range"
          min="0"
          max="0"
          step="1"
          value="0"
          list="timeline-marks"
          aria-label="年代"
        />
        <button
          id="timeline-next"
          class="timeline-btn"
          type="button"
          aria-label="次の年代"
        >
          ›
        </button>
      </div>
      <datalist id="timeline-marks"></datalist>
    </div>
    <!-- TASK-9: データ出典・attribution・境界精度の免責を常時表示（app-spec §2.1, §5.4） -->
    <footer id="app-footer" class="app-footer">
      境界データ:
      <a
        href="https://github.com/aourednik/historical-basemaps"
        target="_blank"
        rel="noopener noreferrer"
      >historical-basemaps</a>（GPL-3.0） / 帝国領邦:
      <a
        href="https://doi.org/10.3929/ethz-b-000472583"
        target="_blank"
        rel="noopener noreferrer"
      >ETH Zürich (Roller)</a>（CC BY-NC-SA 4.0） / 地図: © Protomaps ©
      OpenStreetMap contributors / 河川:
      <a
        href="https://www.naturalearthdata.com"
        target="_blank"
        rel="noopener noreferrer"
      >Natural Earth</a>（パブリックドメイン） ／
      歴史的境界は概略であり厳密ではありません（元データは work in progress）。
    </footer>
    <script type="module" src="app.js"></script>
  </body>
</html>
