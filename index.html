<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ヨーロッパ国境変遷マップ</title>
    <link rel="stylesheet" href="vendor/maplibre-gl.css" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div id="map"></div>
    <!-- TASK-7: ホバーツールチップ（app-spec §5.2）。位置・内容・表示制御は main.ts -->
    <div id="info-tooltip" class="info-tooltip" role="tooltip" hidden></div>
    <!-- TASK-7: クリック情報パネル（モバイルのホバー代替）。左上固定・閉じるボタン付き -->
    <div
      id="info-panel"
      class="info-panel"
      role="status"
      aria-live="polite"
      hidden
    >
      <span id="info-panel-label" class="info-panel-label"></span>
      <button
        id="info-panel-close"
        class="info-panel-close"
        type="button"
        aria-label="閉じる"
      >
        ×
      </button>
    </div>
    <!-- TASK-6: タイムラインスライダー（app-spec §5.1）。目盛り・値・年表示は main.ts が初期化する -->
    <div
      id="timeline"
      class="timeline"
      role="group"
      aria-label="年代スライダー"
    >
      <span id="timeline-year" class="timeline-year" aria-live="polite"
      >1000</span>
      <div class="timeline-controls">
        <button
          id="timeline-prev"
          class="timeline-btn"
          type="button"
          aria-label="前の年代"
        >
          ‹
        </button>
        <input
          id="timeline-slider"
          class="timeline-slider"
          type="range"
          min="0"
          max="0"
          step="1"
          value="0"
          list="timeline-marks"
          aria-label="年代"
        />
        <button
          id="timeline-next"
          class="timeline-btn"
          type="button"
          aria-label="次の年代"
        >
          ›
        </button>
      </div>
      <datalist id="timeline-marks"></datalist>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
