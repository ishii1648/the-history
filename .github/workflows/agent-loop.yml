name: Agent Loop

# ループエンジニアリングの外側ループ:
# main への push（= PR マージ）を起点に次タスクを決定的に選択し、
# エージェントの実装セッションを自動起動する。
# 人の介入は例外時のみ（docs/development-style.md のエスカレーション規約を参照）。
#
# 有効化するには:
# - リポジトリ変数 AGENT_LOOP_ENABLED を 'true' に設定する
# - シークレット CLAUDE_CODE_OAUTH_TOKEN を設定する
# 無効化はリポジトリ変数を削除または 'true' 以外にするだけでよい。

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-loop
  cancel-in-progress: false

jobs:
  pick-next-task:
    name: pick-next-task
    runs-on: ubuntu-latest
    if: vars.AGENT_LOOP_ENABLED == 'true'
    outputs:
      task_id: ${{ steps.pick.outputs.task_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Pick next task
        id: pick
        run: |
          # 次タスクを決定的に選択する（To Do かつ依存全て Done のうち ordinal 最小）。
          # In Progress のタスクが残っている間（finalization 未完了）は何も出力されない。
          next_task="$(deno run --allow-read scripts/next_task.ts)"
          if [ -z "$next_task" ]; then
            echo "着手可能なタスクがない、または In Progress のタスクがあるため何もしません。"
            exit 0
          fi

          # 二重着手ガード: 同じタスクのブランチ（task-N-*）が既に存在すればスキップ。
          task_number="${next_task#TASK-}"
          if git ls-remote --heads origin "task-${task_number}-*" | grep -q .; then
            echo "${next_task} のブランチが既に存在するため何もしません（着手済み）。"
            exit 0
          fi

          echo "次タスク: ${next_task}"
          echo "task_id=${next_task}" >> "$GITHUB_OUTPUT"

  start-agent-session:
    name: start-agent-session
    runs-on: ubuntu-latest
    needs: pick-next-task
    if: needs.pick-next-task.outputs.task_id != ''
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start Claude Code session
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ needs.pick-next-task.outputs.task_id }} に着手してください。

            CLAUDE.md と docs/development-style.md の規約に厳密に従うこと:
            - backlog CLI で該当タスクを In Progress にし、実装プランを記録する
            - ブランチ名は task-N-slug 形式にする
            - TDD（テスト先行で red を確認してから green）で実装する
            - deno fmt / lint / test / build を green にしてから PR を作成する
            - PR タイトル・説明に TASK ID を明記する
            - 判断に迷う場合（AC が曖昧・仕様判断が必要）は実装を進めず、
              needs-human ラベル付きの GitHub issue を起票して停止する
